version: '3.8'

x-common-node: &common-node
  image: node:20
  working_dir: /app
  volumes:
    - ..:/app
    - /app/node_modules
    - /app/backend/indexer/node_modules
    - /app/backend/relayer/node_modules
    - /app/backend/oracle-adapter/node_modules
    - /app/backend/keeper/node_modules
  env_file:
    - .env.testnet
  environment:
    - CI=true
    - INDEXER_URL=http://indexer:3001

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: vayyl_indexer
    ports:
      - "5432:5432"

  indexer:
    <<: *common-node
    command: sh -c "npm install -g pnpm && pnpm --dir backend/indexer install && pnpm --dir backend/indexer run dev"
    ports:
      - "3001:3001"
    depends_on:
      - postgres

  relayer:
    <<: *common-node
    command: sh -c "npm install -g pnpm && pnpm --dir backend/relayer install && pnpm --dir backend/relayer run dev"
    ports:
      - "3002:3002"

  oracle-adapter:
    <<: *common-node
    command: sh -c "npm install -g pnpm && pnpm --dir backend/oracle-adapter install && pnpm --dir backend/oracle-adapter run dev"
    ports:
      - "3003:3003"

  keeper:
    <<: *common-node
    command: sh -c "npm install -g pnpm && pnpm --dir backend/keeper install && pnpm --dir backend/keeper run dev"
